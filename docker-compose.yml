services:
  postgres:
    image: postgres:16-alpine
    container_name: srs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-srs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-srs_dev_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-srs}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-srs} -d ${POSTGRES_DB:-srs}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - srs

  redis:
    image: redis:7-alpine
    container_name: srs-redis
    restart: unless-stopped
    # noeviction — как рекомендует BullMQ (не выкидывать ключи очередей при давлении по памяти).
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - srs

  minio:
    image: minio/minio:latest
    container_name: srs-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-srs}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-srs_dev_pwd}
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - srs

  minio-setup:
    image: minio/mc:latest
    container_name: srs-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-srs} ${S3_SECRET_KEY:-srs_dev_pwd};
      mc mb --ignore-existing local/${S3_BUCKET:-srs-dev};
      mc anonymous set download local/${S3_BUCKET:-srs-dev};
      exit 0;
      "
    networks:
      - srs

  adminer:
    image: adminer:latest
    container_name: srs-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8085}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - srs

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  srs:
    driver: bridge
