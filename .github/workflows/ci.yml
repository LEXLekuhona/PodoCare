# CI gate for main/develop. Deploy staging listens via workflow_run on successful push to main.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @srs/api exec prisma generate

      - run: pnpm turbo run lint typecheck

  core-e2e-gate:
    name: Core e2e gate (auth + notifications + appointments)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @srs/api exec prisma generate

      - name: Build @srs/shared-types
        run: pnpm --filter @srs/shared-types build

      - name: Run core e2e suite (merge gate)
        run: pnpm --filter @srs/api test:e2e:core --ci

  test:
    name: Tests (unit + integration + e2e)
    runs-on: ubuntu-latest
    needs: core-e2e-gate

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @srs/api exec prisma generate

      - name: Build @srs/shared-types
        run: pnpm --filter @srs/shared-types build

      - name: Run unit tests
        run: pnpm --filter @srs/api test:unit:cov --ci

      - name: Run integration tests (testcontainers)
        run: pnpm --filter @srs/api test:integration --ci

      - name: Run e2e tests (testcontainers)
        run: pnpm --filter @srs/api test:e2e --ci

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-api
          path: apps/api/coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @srs/api exec prisma generate
      - run: pnpm turbo run build
